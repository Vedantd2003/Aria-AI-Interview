services:
  - type: web
    name: aria-interview-server
    env: node
    rootDir: server
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: VAPI_PRIVATE_KEY
        sync: false
      - key: VAPI_PUBLIC_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: web
    name: aria-interview-client
    env: static
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_VAPI_PUBLIC_KEY
        sync: false
